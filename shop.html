.leftside {

.scroll-gallery {

}


.scroll-gallery img {

.scroll-gallery::-webkit-scrollbar {

 }

 }



/* DERECHA */

.right-container-wrapper{

.divider {

.button {

  width: 100%;
  background: none;

  text-align: center;          
  text-decoration: none;      
  cursor: pointer;
  margin-bottom: 20px;
  font-family: 'Aspekta';
  font-weight: 150;
  font-size: 20px;
  transition: 0.2s ease;      
}

.button:hover {
  color: black;
  background-color: white;
}

/* DESPLEGABLE */
.toggle {
  display: flex;
  align-items: center;
  justify-content: space-between;
 font-size: 20px;
 font-weight: 550;
  width: 100%;          
  cursor: pointer;
  border-bottom: 1px solid white;
  padding-bottom: 20px;
}


.toggle::after {
  content: "∨";
  margin-left: 10px;    
  flex-shrink: 0;       
  transition: transform 0.8s ease;
}


.extra {
  max-height: 0;
  overflow: hidden;
  transition: 0.3s ease;
  font-size: 20px;
}

.extra.open {
  max-height: 500px;
  margin-top: 15px;
}

/* TABLA */
table {
font-size: 20px;
  width: 100%;

}

td, th {

th{

.enlace{
